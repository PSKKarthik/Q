<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QGX — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .container { text-align: center; max-width: 400px; padding: 40px 20px; }
    .logo { font-size: 48px; font-weight: 700; letter-spacing: 12px; margin-bottom: 8px; }
    .sub { font-family: 'Courier New', monospace; font-size: 11px; color: #666; letter-spacing: 2px; margin-bottom: 40px; }
    .icon { font-size: 64px; margin-bottom: 24px; opacity: 0.3; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
    p { font-size: 14px; color: #888; line-height: 1.6; margin-bottom: 32px; }
    .btn { display: inline-block; padding: 10px 24px; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; text-decoration: none; font-family: 'Courier New', monospace; font-size: 12px; cursor: pointer; background: transparent; transition: all 0.2s; }
    .btn:hover { border-color: #666; background: rgba(255,255,255,0.05); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Q G X</div>
    <div class="sub">LEARNING MANAGEMENT SYSTEM</div>
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Some features may be unavailable until you're back online.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
